          required: false
          in: query
          description: Filter by symbol
          schema:
            example: BTCUSDT
            type: string
        - name: side
          required: false
          in: query
          description: Filter by position side (LONG or SHORT)
          schema:
            example: LONG
            type: string
            enum:
              - LONG
              - SHORT
        - name: status
          required: false
          in: query
          description: Filter by status (is_active)
          schema:
            type: string
            enum:
              - OPEN
              - CLOSED
        - name: cursor
          required: false
          in: query
          description: Cursor for pagination (position ID)
          schema:
            example: clxy1234567890abcdefghijk
            type: string
