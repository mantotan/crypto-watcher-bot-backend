openapi: 3.0.0
paths:
  /auth/register:
    post:
      operationId: AuthController_register
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterDto'
      responses:
        '201':
          description: User successfully registered. Verification email sent. No tokens returned until email is verified.
        '400':
          description: Invalid input
        '409':
          description: Email already registered
      summary: Register a new user
      tags: &ref_0
        - Authentication
  /auth/verify-email:
    post:
      operationId: AuthController_verifyEmail
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyEmailDto'
      responses:
        '200':
          description: Email verified successfully. Tokens set as HTTP-only cookies.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  user:
                    type: object
        '400':
          description: Invalid or expired verification code
        '429':
          description: 'Too many attempts. Rate limit: 10 per minute'
      summary: Verify email with 6-digit code (sets HTTP-only cookies)
      tags: *ref_0
  /auth/resend-verification:
    post:
      operationId: AuthController_resendVerification
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResendVerificationDto'
      responses:
        '200':
          description: Verification code sent successfully
        '400':
          description: User not found or email already verified
        '429':
          description: 'Too many requests. Rate limit: 3 per minute'
      summary: Resend email verification code
      tags: *ref_0
  /auth/login:
    post:
      operationId: AuthController_login
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginDto'
      responses:
        '200':
          description: Successfully authenticated. Tokens set as HTTP-only cookies.
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    properties:
                      user:
                        type: object
                    description: Login successful - tokens set in cookies
                  - type: object
                    properties:
                      requires2FA:
                        type: boolean
                        example: true
                      tempToken:
                        type: string
                      message:
                        type: string
                    description: 2FA required - use temp token to verify
        '401':
          description: Invalid credentials
        '403':
          description: Email not verified
      summary: Login with email and password (sets HTTP-only cookies)
      tags: *ref_0
  /auth/refresh:
    post:
      description: Reads refreshToken from HTTP-only cookie and issues new tokens
      operationId: AuthController_refresh
      parameters: []
      responses:
        '200':
          description: Token refreshed successfully. New tokens set as HTTP-only cookies.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Tokens refreshed successfully
        '401':
          description: Invalid or missing refresh token
      summary: Refresh access token using refresh token from cookie
      tags: *ref_0
  /auth/forgot-password:
    post:
      operationId: AuthController_forgotPassword
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForgotPasswordDto'
      responses:
        '200':
          description: Password reset code sent if email exists (message returned regardless for security)
        '429':
          description: 'Too many requests. Rate limit: 3 per minute'
      summary: Request password reset code
      tags: *ref_0
  /auth/verify-reset-code:
    post:
      operationId: AuthController_verifyResetCode
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyResetCodeDto'
      responses:
        '200':
          description: Reset code is valid
        '400':
          description: Invalid or expired reset code
        '429':
          description: 'Too many attempts. Rate limit: 5 per minute'
      summary: Verify password reset code is valid
      tags: *ref_0
  /auth/reset-password:
    post:
      operationId: AuthController_resetPassword
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordDto'
      responses:
        '200':
          description: Password reset successfully
        '400':
          description: Invalid or expired reset code
        '429':
          description: 'Too many attempts. Rate limit: 5 per minute'
      summary: Reset password with verification code
      tags: *ref_0
  /auth/set-password:
    post:
      description: Allows OAuth users (Google login) who don't have a password to set one. Once set, users can log in with either method. This endpoint ONLY works if the user has no password yet.
      operationId: AuthController_setPassword
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetPasswordDto'
      responses:
        '200':
          description: Password set successfully. User can now log in with email/password.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Password set successfully. You can now log in with email and password.
        '400':
          description: Password is already set. Use password reset flow to change it.
        '401':
          description: Unauthorized - must be logged in
      summary: Set password for OAuth users
      tags: *ref_0
  /auth/me:
    get:
      operationId: AuthController_getProfile
      parameters: []
      responses:
        '200':
          description: User profile retrieved
        '401':
          description: Unauthorized
      summary: Get current authenticated user profile
      tags: *ref_0
  /auth/profile:
    patch:
      operationId: AuthController_updateProfile
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfileDto'
      responses:
        '200':
          description: Profile updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Profile updated successfully
                  user:
                    type: object
                    properties:
                      id:
                        type: string
                      email:
                        type: string
                      name:
                        type: string
                      email_verified:
                        type: boolean
                      preferred_timezone:
                        type: string
                        example: America/New_York
                      created_at:
                        type: string
                        format: date-time
        '400':
          description: Invalid input
        '401':
          description: Unauthorized
      security:
        - bearer: []
      summary: Update user profile (name, timezone)
      tags: *ref_0
  /auth/logout:
    post:
      operationId: AuthController_logout
      parameters: []
      responses:
        '200':
          description: Successfully logged out. Cookies cleared.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Logged out successfully
        '401':
          description: Unauthorized
      summary: Logout user by clearing authentication cookies
      tags: *ref_0
  /auth/google:
    get:
      operationId: AuthController_googleLogin
      parameters: []
      responses:
        '302':
          description: Redirects to Google consent screen
      summary: Initiate Google OAuth login flow
      tags: *ref_0
  /auth/google/callback:
    get:
      operationId: AuthController_googleCallback
      parameters: []
      responses:
        '302':
          description: Redirects to frontend with secure HTTP-only cookies (login) or to settings page (linking)
        '401':
          description: OAuth authentication failed
        '409':
          description: Google account already linked to another user (linking only)
      summary: Google OAuth callback (handles both login and account linking)
      tags: *ref_0
  /auth/google/link:
    get:
      operationId: AuthController_googleLink
      parameters: []
      responses:
        '302':
          description: Redirects to Google consent screen with state parameter
        '401':
          description: Unauthorized - user must be logged in
      summary: Initiate Google account linking for authenticated user
      tags: *ref_0
  /auth/account/unlink/{provider}:
    delete:
      operationId: AuthController_unlinkProvider
      parameters:
        - name: provider
          required: true
          in: path
          description: OAuth provider to unlink
          schema:
            enum:
              - google
            type: string
      responses:
        '200':
          description: Provider unlinked successfully
        '400':
          description: Cannot unlink - user has no password set or provider not linked
        '401':
          description: Unauthorized
      summary: Unlink OAuth provider from account
      tags: *ref_0
  /auth/accounts/linked:
    get:
      operationId: AuthController_getLinkedAccounts
      parameters: []
      responses:
        '200':
          description: List of linked OAuth accounts
          content:
            application/json:
              schema:
                type: object
                properties:
                  accounts:
                    type: array
                    items:
                      type: object
                      properties:
                        provider:
                          type: string
                          example: google
                        linked_at:
                          type: string
                          format: date-time
                  hasPassword:
                    type: boolean
                    example: true
        '401':
          description: Unauthorized
      summary: Get list of linked OAuth providers
      tags: *ref_0
  /auth/2fa/setup:
    post:
      description: Generates TOTP secret and QR code. User must scan QR code and verify with code in step 2 (/auth/2fa/enable).
      operationId: AuthController_setup2FA
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Setup2FADto'
      responses:
        '200':
          description: QR code generated. Scan with authenticator app and verify to complete setup.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  qrCode:
                    type: string
                    description: QR code data URL for authenticator app
                  secret:
                    type: string
                    description: TOTP secret for manual entry (Base32)
        '400':
          description: 2FA already enabled
        '401':
          description: Invalid password or unauthorized
      summary: 'Setup 2FA - Step 1: Generate QR code'
      tags: *ref_0
  /auth/2fa/enable:
    post:
      description: Verifies 6-digit code from authenticator app. If valid, enables 2FA and returns backup codes.
      operationId: AuthController_enable2FA
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Enable2FADto'
      responses:
        '200':
          description: 2FA enabled successfully. Returns backup codes (save these securely).
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  backupCodes:
                    type: array
                    items:
                      type: string
                    description: One-time backup codes (save these securely)
        '400':
          description: 2FA already enabled or setup not started
        '401':
          description: Invalid 2FA code or unauthorized
      summary: 'Enable 2FA - Step 2: Verify code and activate'
      tags: *ref_0
  /auth/2fa/disable:
    post:
      operationId: AuthController_disable2FA
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Disable2FADto'
      responses:
        '200':
          description: 2FA disabled successfully. All sessions invalidated.
        '400':
          description: 2FA is not enabled
        '401':
          description: Invalid password or 2FA code
      summary: Disable 2FA for authenticated user
      tags: *ref_0
  /auth/2fa/verify:
    post:
      operationId: AuthController_verify2FA
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Verify2FADto'
      responses:
        '200':
          description: 2FA verified successfully. Tokens set as HTTP-only cookies.
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    type: object
                  usedBackupCode:
                    type: boolean
        '401':
          description: Invalid temporary token or 2FA code
        '429':
          description: 'Too many failed 2FA attempts. Rate limit: 10 per minute'
      summary: Verify 2FA code during login (completes login flow, sets HTTP-only cookies)
      tags: *ref_0
  /auth/2fa/regenerate-backup-codes:
    post:
      operationId: AuthController_regenerateBackupCodes
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegenerateBackupCodesDto'
      responses:
        '200':
          description: Backup codes regenerated successfully. Returns new codes (show once).
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  backupCodes:
                    type: array
                    items:
                      type: string
                    description: New one-time backup codes (save these securely)
        '400':
          description: 2FA is not enabled
        '401':
          description: Invalid password or 2FA code
      summary: Regenerate backup codes
      tags: *ref_0
  /auth/2fa/status:
    get:
      operationId: AuthController_get2FAStatus
      parameters: []
      responses:
        '200':
          description: 2FA status retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  twoFactorEnabled:
                    type: boolean
                  twoFactorEnabledAt:
                    type: string
                    format: date-time
                    nullable: true
                  remainingBackupCodes:
                    type: number
        '401':
          description: Unauthorized
      summary: Get 2FA status for authenticated user
      tags: *ref_0
  /backtest/tasks:
    post:
      description: Creates a new backtest task with the specified parameters. The task will be queued for processing.
      operationId: BacktestController_createTask
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBacktestTaskDto'
      responses:
        '201':
          description: Backtest task created successfully
        '400':
          description: Invalid input or date range
        '401':
          description: Unauthorized
        '404':
          description: Strategy not found
      security: &ref_1
        - JWT-auth: []
      summary: Create a new backtest task
      tags: &ref_2
        - Backtest
    get:
      description: Returns a paginated list of backtest tasks for the authenticated user. By default, returns only non-archived and non-deleted tasks.
      operationId: BacktestController_listTasks
      parameters:
        - name: cursor
          required: false
          in: query
          description: Cursor for pagination
          schema:
            example: cm1234567890abcdefghijk
            type: string
        - name: limit
          required: false
          in: query
          description: 'Number of tasks per page (default: 20, max: 100)'
          schema:
            minimum: 1
            maximum: 100
            example: 20
            type: number
        - name: status
          required: false
          in: query
          description: Filter by task status
          schema:
            example: COMPLETED
            type: string
            enum:
              - PENDING
              - QUEUED
              - RUNNING
              - COMPLETED
              - FAILED
              - CANCELLED
        - name: archived
          required: false
          in: query
          description: 'Filter by archive status (default: false - shows only non-archived tasks)'
          schema:
            example: false
            type: boolean
      responses:
        '200':
          description: Tasks retrieved successfully
        '401':
          description: Unauthorized
      security: *ref_1
      summary: List all backtest tasks
      tags: *ref_2
  /backtest/tasks/{id}:
    get:
      description: Returns a specific backtest task including its result summary (without individual trades). Archived tasks are still accessible. Returns 404 only if task is soft deleted or not found.
      operationId: BacktestController_getTaskById
      parameters:
        - name: id
          required: true
          in: path
          description: Backtest task ID
          schema:
            type: string
      responses:
        '200':
          description: Task retrieved successfully (including archived tasks)
        '401':
          description: Unauthorized
        '404':
          description: Task not found or has been deleted
      security: *ref_1
      summary: Get backtest task by ID
      tags: *ref_2
    delete:
      description: Soft deletes a backtest task. The task will be permanently hidden from all endpoints. Cannot delete a task that is currently running.
      operationId: BacktestController_deleteTask
      parameters:
        - name: id
          required: true
          in: path
          description: Backtest task ID
          schema:
            type: string
      responses:
        '200':
          description: Task deleted successfully
        '400':
          description: Cannot delete a running task
        '401':
          description: Unauthorized
        '404':
          description: Task not found
      security: *ref_1
      summary: Soft delete a backtest task
      tags: *ref_2
  /backtest/tasks/{id}/archive:
    patch:
      description: Archives a backtest task. Cannot archive a task that is currently running.
      operationId: BacktestController_archiveTask
      parameters:
        - name: id
          required: true
          in: path
          description: Backtest task ID
          schema:
            type: string
      responses:
        '200':
          description: Task archived successfully
        '400':
          description: Cannot archive a running task
        '401':
          description: Unauthorized
        '404':
          description: Task not found
      security: *ref_1
      summary: Archive a backtest task
      tags: *ref_2
  /backtest/tasks/{id}/unarchive:
    patch:
      description: Restores an archived backtest task to active status.
      operationId: BacktestController_unarchiveTask
      parameters:
        - name: id
          required: true
          in: path
          description: Backtest task ID
          schema:
            type: string
      responses:
        '200':
          description: Task unarchived successfully
        '401':
          description: Unauthorized
        '404':
          description: Task not found
      security: *ref_1
      summary: Unarchive a backtest task
      tags: *ref_2
  /backtest/results/{resultId}/trades:
    get:
      description: Returns individual trades from a backtest result with cursor-based pagination, filtering, and sorting options. Supports sorting by date (entry_datetime, exit_datetime, created_at), PnL (net_pnl), and risk/reward ratio (reward_risk_ratio). Use this endpoint to retrieve large datasets efficiently.
      operationId: BacktestController_getResultTrades
      parameters:
        - name: resultId
          required: true
          in: path
          description: Backtest result ID
          schema:
            type: string
        - name: cursor
          required: false
          in: query
          description: 'Cursor for pagination (last trade ID from previous page). WARNING: Reset cursor to null when changing sort_by or sort_order parameters.'
          schema:
            example: cm1234567890abcdefghijk
            type: string
        - name: limit
          required: false
          in: query
          description: Number of trades to return per page
          schema:
            minimum: 1
            maximum: 1000
            default: 100
            example: 100
            type: number
        - name: symbol
          required: false
          in: query
          description: Filter by symbol
          schema:
            example: BTCUSDT
            type: string
        - name: timeframe
          required: false
          in: query
          description: Filter by timeframe
          schema:
            example: 4h
            type: string
        - name: profitable
          required: false
          in: query
          description: Filter by profitability (true = winning trades, false = losing trades)
          schema:
            example: true
            type: boolean
        - name: exit_reason
          required: false
          in: query
          description: Filter by exit reason
          schema:
            example: stop_loss_hit
            type: string
            enum:
              - stop_loss_hit
              - take_profit_hit
              - pattern_expired
        - name: sort_by
          required: false
          in: query
          description: Field to sort by
          schema:
            default: entry_datetime
            example: entry_datetime
            type: string
            enum:
              - entry_datetime
              - exit_datetime
              - created_at
              - net_pnl
              - reward_risk_ratio
        - name: sort_order
          required: false
          in: query
          description: Sort order (asc = ascending, desc = descending). Default is asc for date fields, desc for metrics (pnl, reward_risk_ratio)
          schema:
            example: asc
            type: string
            enum:
              - asc
              - desc
      responses:
        '200':
          description: Trades retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BacktestTradesResponseDto'
        '401':
          description: Unauthorized
        '404':
          description: Result not found
      security: *ref_1
      summary: Get backtest result trades with pagination and sorting
      tags: *ref_2
  /backtest/trades/{tradeId}:
    get:
      description: Returns detailed information about a specific backtest trade including 50 candles before and 50 candles after the first top/bottom from the pattern. This endpoint fetches candle data from the GraphQL chart data service.
      operationId: BacktestController_getTradeDetails
      parameters:
        - name: tradeId
          required: true
          in: path
          description: Backtest trade ID
          schema:
            type: string
      responses:
        '200':
          description: Trade details retrieved successfully
        '401':
          description: Unauthorized
        '404':
          description: Trade not found
      security: *ref_1
      summary: Get backtest trade details with candle data
      tags: *ref_2
  /backtest/tasks/{taskId}/progress:
    get:
      description: Returns the current progress of a backtest task. This is a polling fallback for clients that cannot use WebSocket. For real-time updates, use the WebSocket gateway instead.
      operationId: BacktestController_getTaskProgress
      parameters:
        - name: taskId
          required: true
          in: path
          description: Backtest task ID
          schema:
            type: string
      responses:
        '200':
          description: Progress retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      backtest_id:
                        type: string
                        description: Backtest task ID
                      user_id:
                        type: string
                        description: User who owns this backtest
                      status:
                        type: string
                        enum:
                          - pending
                          - running
                          - completed
                          - failed
                        description: Current backtest status
                      progress_percentage:
                        type: number
                        example: 45.5
                        description: Progress 0-100 (decimal)
                      current_step:
                        type: string
                        example: detecting_patterns
                        description: Current processing step
                        enum:
                          - initializing
                          - fetching_data
                          - detecting_patterns
                          - sorting_patterns
                          - executing_trades
                          - generating_results
                          - finalizing
                          - completed
                          - failed
                      timestamp:
                        type: string
                        format: date-time
                        description: ISO 8601 UTC timestamp
                      metadata:
                        type: object
                        description: Context-specific metadata (varies by processing step)
                        properties:
                          current_symbol:
                            type: string
                            example: BTCUSDT
                          current_timeframe:
                            type: string
                            example: 4h
                          total_patterns_found:
                            type: number
                            example: 87
                          estimated_completion:
                            type: string
                            format: date-time
        '401':
          description: Unauthorized
        '403':
          description: Forbidden - Task belongs to another user
        '404':
          description: Task not found or no progress available
      security: *ref_1
      summary: Get backtest task progress (HTTP polling fallback)
      tags: *ref_2
  /backtest/progress/all:
    get:
      description: Returns progress for all currently active backtest tasks. Useful for dashboard views. For real-time updates, use the WebSocket gateway instead.
      operationId: BacktestController_getAllProgress
      parameters: []
      responses:
        '200':
          description: All active tasks progress retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    description: Map of backtest_id to progress data
                    additionalProperties:
                      type: object
                      properties:
                        backtest_id:
                          type: string
                          description: Backtest task ID
                        user_id:
                          type: string
                          description: User who owns this backtest
                        status:
                          type: string
                          enum:
                            - pending
                            - running
                            - completed
                            - failed
                          description: Current backtest status
                        progress_percentage:
                          type: number
                          description: Progress 0-100 (decimal)
                        current_step:
                          type: string
                          description: Current processing step
                          enum:
                            - initializing
                            - fetching_data
                            - detecting_patterns
                            - sorting_patterns
                            - executing_trades
                            - generating_results
                            - finalizing
                            - completed
                            - failed
                        timestamp:
                          type: string
                          format: date-time
                          description: ISO 8601 UTC timestamp
                        metadata:
                          type: object
                          description: Context-specific metadata
                  count:
                    type: number
                    example: 3
                    description: Number of active backtests
        '401':
          description: Unauthorized
      security: *ref_1
      summary: Get all active backtest tasks progress (dashboard)
      tags: *ref_2
  /backtest/strategies:
    post:
      description: Creates a new backtest strategy template that can be reused for multiple backtest tasks.
      operationId: BacktestController_createStrategy
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBacktestStrategyDto'
      responses:
        '201':
          description: Strategy created successfully
        '400':
          description: Invalid input or duplicate strategy name
        '401':
          description: Unauthorized
      security: *ref_1
      summary: Create a new backtest strategy
