version: '3.8'

services:
  crypto-watcher-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: crypto_watcher_bot_api
    ports:
      - "3733:3733"
    environment:
      - NODE_ENV=production
      - PORT=3733
      - DATABASE_URL=${DATABASE_URL}
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET}
      - JWT_ACCESS_EXPIRES_IN=${JWT_ACCESS_EXPIRES_IN}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - JWT_REFRESH_EXPIRES_IN=${JWT_REFRESH_EXPIRES_IN}
    env_file:
      - ../.env
    networks:
      - shared
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'node dist/src/main' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

networks:
  shared:
    external: true
    name: crypto_watcher_network
