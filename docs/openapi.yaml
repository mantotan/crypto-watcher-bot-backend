        '200':
          description: Dashboard summary retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  total_strategies:
                    type: number
                    example: 5
                  live_strategies:
                    type: number
                    example: 2
                  total_portfolios_value:
                    type: number
                    example: 25000.5
                  today_pnl:
                    type: number
                    example: 150.25
                  open_positions:
                    type: number
                    example: 3
                  strategies_by_performance:
                    type: array
                    items:
                      type: object
                      properties:
                        strategy:
                          type: object
                        portfolio:
                          type: object
                        performance_7d:
                          type: number
                          example: 5.2
                  note:
                    type: string
        '401':
          description: Unauthorized
      security:
        - JWT-auth: []
      summary: Get dashboard summary
      tags:
        - Dashboard
