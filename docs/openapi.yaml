      type: http
      name: JWT
      description: Enter JWT token
      in: header
  schemas:
    RegisterDto:
      type: object
      properties:
        email:
          type: string
          description: User email address
          example: user@example.com
        password:
          type: string
          description: User password (minimum 8 characters, must contain uppercase, lowercase, and number or special character)
          example: SecurePass123!
          minLength: 8
        name:
          type: string
          description: User full name
          example: John Doe
      required:
        - email
        - password
    VerifyEmailDto:
      type: object
      properties:
        email:
          type: string
          description: User email address
          example: user@example.com
        code:
          type: string
          description: 6-digit verification code
          example: '123456'
          minLength: 6
          maxLength: 6
      required:
        - email
        - code
    ResendVerificationDto:
      type: object
      properties:
        email:
          type: string
          description: User email address to resend verification code
          example: user@example.com
      required:
        - email
    LoginDto:
      type: object
      properties:
        email:
          type: string
          description: User email address
          example: user@example.com
        password:
          type: string
          description: User password
          example: password123
      required:
        - email
        - password
    ForgotPasswordDto:
      type: object
      properties:
        email:
          type: string
          description: User email address to reset password
          example: user@example.com
      required:
        - email
    VerifyResetCodeDto:
      type: object
      properties:
        email:
          type: string
          description: User email address
          example: user@example.com
        code:
          type: string
          description: 6-digit password reset code
          example: '123456'
          minLength: 6
          maxLength: 6
      required:
        - email
        - code
    ResetPasswordDto:
      type: object
      properties:
        email:
          type: string
          description: User email address
          example: user@example.com
        code:
          type: string
          description: 6-digit password reset code
          example: '123456'
          minLength: 6
          maxLength: 6
        newPassword:
          type: string
          description: New password (minimum 8 characters, must contain uppercase, lowercase, and number or special character)
          example: SecurePass123!
          minLength: 8
      required:
        - email
        - code
        - newPassword
    SetPasswordDto:
      type: object
      properties:
        password:
          type: string
          example: NewSecurePassword123!
          description: New password to set for OAuth users
      required:
        - password
    UpdateProfileDto:
      type: object
      properties:
        name:
          type: string
          description: User full name
          example: John Doe
        preferred_timezone:
          type: string
          description: User preferred timezone (IANA timezone identifier)
          example: America/New_York
    Setup2FADto:
      type: object
      properties:
        currentPassword:
          type: string
          description: Current password to confirm identity
          example: MySecurePassword123!
      required:
        - currentPassword
    Enable2FADto:
      type: object
      properties:
        twoFactorCode:
          type: string
          description: 6-digit code from authenticator app to verify 2FA setup
          example: '123456'
      required:
        - twoFactorCode
    Disable2FADto:
      type: object
      properties:
        currentPassword:
          type: string
          description: Current password to confirm identity
          example: MySecurePassword123!
        twoFactorCode:
          type: string
          description: 6-digit 2FA code or backup code to verify identity
          example: '123456'
      required:
        - currentPassword
        - twoFactorCode
    Verify2FADto:
      type: object
      properties:
        tempToken:
          type: string
          description: Temporary token received after successful password verification
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        code:
          type: string
          description: 6-digit 2FA code from authenticator app or backup code
          example: '123456'
      required:
        - tempToken
        - code
    RegenerateBackupCodesDto:
      type: object
      properties:
        currentPassword:
          type: string
          description: Current password to confirm identity
          example: MySecurePassword123!
        twoFactorCode:
          type: string
          description: 6-digit 2FA code from authenticator app
          example: '123456'
      required:
        - currentPassword
        - twoFactorCode
    BacktestStrategyConfigDto:
      type: object
      properties:
        strategy_type:
          type: string
          description: Strategy type identifier
          example: pattern_breakout
        allowed_patterns:
          description: List of allowed pattern types to trade
          example:
            - double_top
            - double_bottom
            - head_shoulders
          type: array
          items:
            type: string
        risk_mode:
          type: string
          description: Risk calculation mode
          enum:
            - PERCENTAGE
            - FIXED_AMOUNT
          example: PERCENTAGE
        risk_per_trade_percentage:
          type: number
          description: Risk percentage per trade (required if risk_mode is "PERCENTAGE")
          example: 5
          minimum: 0.1
          maximum: 100
        fixed_risk_amount:
          type: number
          description: Fixed risk amount in USD per trade (required if risk_mode is "FIXED_AMOUNT")
          example: 100
          minimum: 1
        initial_capital:
          type: number
          description: Initial capital for the backtest in USD
          example: 10000
          minimum: 100
        min_risk_ratio:
          type: number
          description: Minimum acceptable risk/reward ratio
          example: 1.5
        max_risk_ratio:
          type: number
          description: Maximum acceptable risk/reward ratio
          example: 5
        position_type:
          type: string
          description: Position type filter (LONG or SHORT)
          enum:
            - LONG
            - SHORT
          example: LONG
        max_leverage:
          type: number
          description: Maximum leverage to use
          example: 3
          minimum: 1
        trading_fee_percentage:
          type: number
          description: Trading fee percentage (e.g., 0.1 for 0.1%)
          example: 0.1
          minimum: 0
        max_position_size_usd:
          type: number
          description: Maximum position size in USD
          example: 100000
          minimum: 1
      required:
        - strategy_type
        - risk_mode
        - initial_capital
    CreateBacktestTaskDto:
      type: object
      properties:
        name:
          type: string
          description: User-friendly name for the backtest
          example: Double Top Strategy - Q1 2024
        description:
          type: string
          description: Detailed description of the backtest
          example: Testing double top pattern across major pairs
        strategy_id:
          type: string
          description: Optional strategy template ID to use
          example: cm1234567890abcdefghijk
        priority:
          type: string
          description: Queue priority for the backtest task
          enum:
            - high
            - normal
            - low
          default: normal
          example: normal
        symbols:
          description: List of symbols to backtest
          example:
            - BTCUSDT
            - ETHUSDT
            - SOLUSDT
          type: array
          items:
            type: string
        timeframes:
          description: List of timeframes to backtest
          example:
            - 4h
            - 1h
          type: array
          items:
            type: string
        start_date:
          type: string
          description: 'Start date and time for backtest in your local timezone (from user profile). Format: "YYYY-MM-DD HH:mm:ss" or "YYYY-MM-DDTHH:mm:ss" (no timezone offset). Will be automatically converted to UTC using your preferred timezone setting.'
          examples:
            - '2024-01-01 00:00:00'
            - '2024-01-01T00:00:00'
          example: '2024-01-01 00:00:00'
        end_date:
          type: string
          description: 'End date and time for backtest in your local timezone (from user profile). Format: "YYYY-MM-DD HH:mm:ss" or "YYYY-MM-DDTHH:mm:ss" (no timezone offset). Will be automatically converted to UTC using your preferred timezone setting.'
          examples:
            - '2024-12-31 23:59:59'
            - '2024-12-31T23:59:59'
          example: '2024-12-31 23:59:59'
        is_combine_timeframe:
          type: boolean
          description: If true, create separate backtest tasks for each timeframe. If false, combine all timeframes in a single task.
          example: false
          default: false
        is_combine_symbol:
          type: boolean
          description: If true, create separate backtest tasks for each symbol. If false, combine all symbols in a single task.
          example: false
          default: false
        strategy_config:
          description: Strategy configuration for the backtest
          examples:
            percentage_mode:
              summary: Percentage Risk Mode
              value:
                strategy_type: pattern_breakout
                allowed_patterns:
                  - double_top
                  - double_bottom
                risk_mode: PERCENTAGE
                risk_per_trade_percentage: 5
                initial_capital: 10000
                min_risk_ratio: 1.5
                position_type: long
            fixed_amount_mode:
              summary: Fixed Amount Risk Mode
              value:
                strategy_type: pattern_breakout
                allowed_patterns:
                  - double_top
                  - double_bottom
                  - head_shoulders
                risk_mode: FIXED_AMOUNT
                fixed_risk_amount: 100
                initial_capital: 10000
                max_risk_ratio: 5
          allOf:
            - $ref: '#/components/schemas/BacktestStrategyConfigDto'
      required:
        - name
        - symbols
        - timeframes
        - start_date
        - end_date
        - strategy_config
    PaginationMetaDto:
      type: object
      properties:
        total:
          type: number
          description: Total number of items matching the filter
        limit:
          type: number
          description: Number of items per page
        nextCursor:
          type: string
          description: Cursor for the next page (null if no more pages)
          nullable: true
        hasMore:
          type: boolean
          description: Whether there are more pages available
      required:
        - total
        - limit
        - nextCursor
        - hasMore
    TradesSummaryDto:
      type: object
      properties:
        total_trades:
          type: number
          description: Total trades in filtered result
        winning_trades:
          type: number
          description: Number of winning trades
        losing_trades:
          type: number
          description: Number of losing trades
        win_rate:
          type: number
          description: Win rate percentage
        total_pnl:
          type: number
          description: Total net PnL
      required:
        - total_trades
        - winning_trades
        - losing_trades
        - win_rate
        - total_pnl
    BacktestTradesResponseDto:
      type: object
      properties:
        data:
          type: array
          description: Array of backtest trades
        pagination:
          description: Pagination metadata
          allOf:
            - $ref: '#/components/schemas/PaginationMetaDto'
        summary:
          description: Summary statistics for filtered trades
          allOf:
            - $ref: '#/components/schemas/TradesSummaryDto'
      required:
        - data
        - pagination
        - summary
    CreateBacktestStrategyDto:
      type: object
      properties:
        name:
          type: string
          description: User-friendly name for the strategy
          example: Aggressive Double Top Strategy
        strategy_type:
          type: string
          description: Strategy type identifier
          example: pattern_breakout
        allowed_patterns:
          description: List of allowed pattern types to trade
          example:
            - double_top
            - double_bottom
          type: array
          items:
            type: string
        allowed_symbols:
          description: List of allowed symbols (empty array or omit for all symbols)
          example:
            - BTCUSDT
            - ETHUSDT
          type: array
          items:
            type: string
        timeframes:
          description: List of allowed timeframes (empty array or omit for all timeframes)
          example:
            - 4h
            - 1h
          type: array
          items:
            type: string
        position_type:
          type: string
          description: Position type filter (LONG, SHORT, or omit for both)
          enum:
            - LONG
            - SHORT
          example: LONG
        config:
          description: Strategy configuration including risk management
          allOf:
            - $ref: '#/components/schemas/BacktestStrategyConfigDto'
      required:
        - name
        - strategy_type
        - allowed_patterns
        - config
    CreateTradingAccountDto:
      type: object
      properties:
        name:
          type: string
          description: Name for the trading account
          example: My Binance Account
        exchange:
          type: string
          description: Exchange name
          example: binance
          enum:
            - binance
        api_key:
          type: string
          description: Exchange API key
          example: your_api_key_here
        api_secret:
          type: string
          description: Exchange API secret
          example: your_api_secret_here
        initial_balance:
          type: number
          description: Initial balance for paper trading portfolio
          example: 10000
          minimum: 0
        maker_fee:
          type: number
          description: Maker fee percentage (e.g., 0.02 for 0.02%)
          example: 0.02
          minimum: 0
          maximum: 100
          default: 0.02
        taker_fee:
          type: number
          description: Taker fee percentage (e.g., 0.05 for 0.05%)
          example: 0.05
          minimum: 0
          maximum: 100
          default: 0.05
        max_leverage:
          type: number
          description: Maximum leverage allowed (e.g., 125 for 125x)
          example: 125
          minimum: 1
          maximum: 125
          default: 125
