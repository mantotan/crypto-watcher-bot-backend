version: '3.8'

services:
  crypto_watcher_bot_api:
    image: ghcr.io/mantotan/crypto-watcher-bot-backend:latest
    container_name: crypto_watcher_bot_api
    ports:
      # Bind to localhost only for security
      - "127.0.0.1:3733:3733"
    env_file:
      # Secrets directory managed on production server
      - /opt/your-app/secrets/api.env
    environment:
      - NODE_ENV=production
    networks:
      - crypto_watcher_network
    restart: unless-stopped
    volumes:
      # Persistent logs
      - logs:/app/logs
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'node dist/main' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

networks:
  crypto_watcher_network:
    external: true

volumes:
  logs:
    driver: local
