        '200':
          description: Position retrieved successfully. Includes "status" field. Open positions have unrealized_pnl and mark_price (exit fields are null). Closed trades have exit_datetime, exit_price, exit_reason, net_pnl, roi_percentage (unrealized_pnl is null).
        '401':
          description: Unauthorized
        '404':
          description: Position not found
      security: *ref_8
      summary: Get position details
      tags: *ref_9
  /positions/{id}/chart-data:
    get:
      description: 'Fetches candle data from GraphQL service for visualizing the position on a chart. Returns candles before and after position entry time. Works with both open positions and closed trades (uses entry_datetime for closed trades). For closed positions: automatically calculates candles needed to show complete position lifecycle with minimum 30 candles before entry and 30 candles after exit. Auto-calculation can exceed the 200 candles_after limit but is capped at 5000 candles for performance. Very long positions (>5000 candles) may not show the exit.'
      operationId: PositionController_getPositionChartData
      parameters:
        - name: id
          required: true
          in: path
          description: Position ID
          schema:
            type: string
        - name: mode
          required: true
          in: query
          description: Trading mode (REAL or PAPER)
          schema:
            type: string
            enum:
              - REAL
              - PAPER
        - name: candles_before
          required: false
          in: query
          description: Number of candles before entry. For closed positions, minimum 30 candles are guaranteed.
          schema:
            minimum: 1
            maximum: 200
            default: 50
            example: 50
            type: number
        - name: candles_after
          required: false
          in: query
          description: Number of candles after entry. For closed positions, automatically calculated to ensure complete position lifecycle is shown (entry to exit + 30 candles buffer). Auto-calculation can exceed the 200 maximum but is capped at 5000 candles for performance.
          schema:
            minimum: 1
            maximum: 200
            default: 50
            example: 50
            type: number
      responses:
        '200':
          description: Candle data retrieved successfully
        '400':
          description: Failed to fetch candle data
        '401':
          description: Unauthorized
        '404':
          description: Position not found
      security: *ref_8
      summary: Get candle data for position chart
      tags: *ref_9
  /dashboard/summary:
    get:
      description: 'Returns aggregated dashboard data including total strategies, portfolios value, P&L, and top performing strategies. Note: today_pnl and performance_7d are approximations. Implement historical snapshot tracking for accurate calculations.'
